# LedgerLM price seed — per-Mtok USD rates.
#
# Loaded by `ledgerlm init` ONLY when model_prices is empty; the DB is
# authoritative thereafter (edit with `ledgerlm prices set`, not this file).
#
# Verification: rates below were checked on 2026-07-03 against the official
# pricing pages —
#   Anthropic: https://platform.claude.com/docs/en/about-claude/pricing
#   OpenAI:    https://developers.openai.com/api/docs/pricing
#
# cache_write rates are Anthropic's 5-MINUTE cache-write rate (1.25x input).
# 1-hour cache writes bill at 2x input; Phase 1 stores a single cache-write
# rate, so 1h-TTL-heavy workloads are slightly underpriced — raw_usage keeps
# the full breakdown for later recomputation. OpenAI does not bill cache
# writes (cache_write: null) and reports cached tokens as reads only.

prices:
  # ---- Anthropic ----
  - provider: anthropic
    model: claude-fable-5
    input_per_mtok: "10.00"
    output_per_mtok: "50.00"
    cache_read_per_mtok: "1.00"
    cache_write_per_mtok: "12.50"
    last_verified: 2026-07-03
  - provider: anthropic
    model: claude-opus-4-8
    input_per_mtok: "5.00"
    output_per_mtok: "25.00"
    cache_read_per_mtok: "0.50"
    cache_write_per_mtok: "6.25"
    last_verified: 2026-07-03
  - provider: anthropic
    model: claude-opus-4-7
    input_per_mtok: "5.00"
    output_per_mtok: "25.00"
